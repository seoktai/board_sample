name: URL Monitor to KakaoTalk

on:
  schedule:
    # 30분마다 실행 (UTC 기준이므로 한국 시간 09:00는 UTC 00:00입니다)
    - cron: '*/1 * * * *'
  workflow_dispatch:      # GitHub UI에서 'Run workflow' 버튼으로 수동 실행 가능

jobs:
  check_and_notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check URL and Send Message
        env:
          # GitHub Secrets에 등록한 변수들을 불러옵니다.
          TOKEN: ${{ secrets.KAKAO_TOKEN }}
          URL: ${{ secrets.TARGET_URL }}
        run: |
          echo "Starting URL monitoring..."
          
          # 1. 대상 URL 호출 (Silent 모드로 결과값 저장)
          RESPONSE=$(curl -s "$URL")
          echo "Full API Response: $RESPONSE"

          # 2. jq를 사용하여 "data" 필드 값 추출
          # JSON: {"result":{"code":200,"message":"성공"},"data":false} 에서 .data만 추출
          IS_TRUE=$(echo "$RESPONSE" | jq '.data')
          echo "Extracted 'data' value: $IS_TRUE"

          # 3. 조건 검사: data가 true인 경우에만 카카오톡 전송
          if [ "$IS_TRUE" = "true" ]; then
            echo "🎯 Condition met! data is true. Sending KakaoTalk message..."
            
            # 카카오톡 '나에게 보내기' API 호출
            # -v 옵션은 디버깅용이며, 전송 성공 시 200 OK가 로그에 찍힙니다.
            curl -v -X POST "https://kapi.kakao.com/v2/api/talk/memo/default/send" \
              -H "Authorization: Bearer $TOKEN" \
              -d 'template_object={
                    "object_type": "text",
                    "text": "📢 [모니터링 알림]\n원하는 결과(data: true)가 확인되었습니다!\n지금 바로 상세 내용을 확인하세요.",
                    "link": {
                        "web_url": "'"$URL"'",
                        "mobile_web_url": "'"$URL"'"
                    },
                    "button_title": "결과 확인하기"
                }'
          else
            # 조건이 맞지 않을 때 로그 남기기
            echo "⏭️ Condition not met. Current data is $IS_TRUE. Skipping notification."
          fi
